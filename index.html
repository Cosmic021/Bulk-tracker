/* ─── RING COMPONENT ─────────────────────────────────────── */
function Ring({ pct, size = 52, stroke = 5, color = GREEN, label }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <div className="ring-item">
      <div className="ring-wrap" style={{ width: size, height: size }}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2a1a" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
        </svg>
        <div className="ring-center">{Math.round(pct)}%</div>
      </div>
      <div className="ring-name">{label}</div>
    </div>
  );
}

  const [loading, setLoading]       = useState(true);

  const today = todayKey();

  /* ── LOAD ── */
  useEffect(() => {
    const r1 = storage.get(`meals:${today}`);
    if (r1) setDayData(JSON.parse(r1.value));

    const week = {};
    for (const k of last7Keys()) {
      const r = storage.get(`meals:${k}`);
      week[k] = r ? JSON.parse(r.value) : {};
    }
    setWeekData(week);

    const rw = storage.get("weights");
    if (rw) setWeights(JSON.parse(rw.value));

    setLoading(false);
  }, []);

  /* ── SAVE DAY ── */
  const saveDay = useCallback((data) => {
    storage.set(`meals:${today}`, JSON.stringify(data));
    setWeekData(prev => ({ ...prev, [today]: data }));
  }, [today]);

  /* ── TOGGLE MEAL ── */
  const toggleMeal = (mealId) => {
    const already = dayData[mealId]?.done;
    const updated = {
      ...dayData,
      [mealId]: already
        ? { done: false, time: null }
        : { done: true, time: nowTime() }
    };
    setDayData(updated);
    saveDay(updated);
    if (!already) showToast("✅ Logged!");
  };

  /* ── TOAST ── */
  const showToast = (msg) => {
    setToast(msg); setToastKey(k => k+1);
    setTimeout(() => setToast(null), 2000);
  };

  /* ── WEIGHT LOG ── */
  const logWeight = () => {
    const v = parseFloat(weightInput);
    if (!v || v < 30 || v > 200) return;
    const entry = { date: today, weight: v };
    const updated = [entry, ...weights.filter(w => w.date !== today)].sort((a,b)=>b.date.localeCompare(a.date));
    setWeights(updated);
    setWeightInput("");
    storage.set("weights", JSON.stringify(updated));
    showToast(`⚖️ ${v} kg saved!`);
  };

  /* ── COMPUTED ── */
  const doneCount = MEALS.filter(m => dayData[m.id]?.done).length;
  const doneProt  = MEALS.filter(m => dayData[m.id]?.done).reduce((s,m)=>s+m.protein,0);
  const doneKcal  = MEALS.filter(m => dayData[m.id]?.done).reduce((s,m)=>s+m.kcal,0);
  const totalProt = MEALS.reduce((s,m)=>s+m.protein,0);
  const totalKcal = MEALS.reduce((s,m)=>s+m.kcal,0);
  const pct = Math.round((doneCount/MEALS.length)*100);

  /* ── STREAK ── */
  const streak = (() => {
    let s = 0;
    for (const k of [...last7Keys()].reverse()) {
      const d = weekData[k] || {};
      const c = MEALS.filter(m=>d[m.id]?.done).length;
      if (c >= Math.ceil(MEALS.length * 0.7)) s++;
      else break;
    }
    return s;
  })();

  if (loading) return (
    <>
      <style>{css}</style>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
        <AppLogo size={64}/>
        <div style={{color:"#3a5a3a",fontFamily:"'Sora',sans-serif",fontSize:13,letterSpacing:".5px"}}>LOADING YOUR DATA…</div>
      </div>
    </>
  );

  return (
    <>
      <style>{css}</style>
      {toast && <div className="toast" key={toastKey}>{toast}</div>}

      <div className="app">
        {/* HEADER */}
        <div className="header">
          <div className="header-top">
            <div>
              <div className="header-date">{new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})}</div>
              <div className="header-title">
                <AppLogo size={34}/>
                BULK<span> TRACKER</span>
              </div>
            </div>
            <div className="streak-badge">
              <div className="streak-val">{streak}</div>
              <div className="streak-lbl">DAY STREAK</div>
            </div>
          </div>
        </div>

        {/* MINI RINGS */}
        {tab === "today" && (
          <div className="ring-row">
            <Ring pct={pct} label="Meals Done" color={GREEN}/>
            <Ring pct={Math.min(100,Math.round((doneProt/totalProt)*100))} label={`${doneProt}g Protein`} color="#60a5fa"/>
            <Ring pct={Math.min(100,Math.round((doneKcal/totalKcal)*100))} label={`${doneKcal} kcal`} color={AMBER}/>
            {last7Keys().slice(-3).map(k=>{
              const d = weekData[k]||{};
              const c = MEALS.filter(m=>d[m.id]?.done).length;
              return <Ring key={k} pct={Math.round((c/MEALS.length)*100)} label={dateLabel(k).split(",")[0]} color="#9ca3af"/>;
            })}
          </div>
        )}

        {/* ═══ TODAY TAB ═══ */}
        {tab === "today" && (
          <>
            <div className="daily-sum">
              <div className="sum-row">
                <div className="sum-title">TODAY'S PROGRESS</div>
                <div className="sum-pct">{pct}%</div>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{width:`${pct}%`}}/>
              </div>
              <div className="sum-stats">
                <div className="sum-stat">
                  <div className="sum-stat-val">{doneCount}<span style={{fontSize:11}}> / {MEALS.length}</span></div>
                  <div className="sum-stat-lbl">Meals Done</div>
                </div>
                <div className="sum-stat">
                  <div className="sum-stat-val" style={{color:"#60a5fa"}}>{doneProt}<span style={{fontSize:11}}>g</span></div>
                  <div className="sum-stat-lbl">Protein Hit</div>
                </div>
                <div className="sum-stat">
                  <div className="sum-stat-val" style={{color:AMBER}}>{doneKcal}</div>
                  <div className="sum-stat-lbl">Kcal Eaten</div>
                </div>
              </div>
            </div>

            <div className="section">
              <div className="sec-title">MEAL CHECKLIST</div>
              {MEALS.map(meal => {
                const isDone = !!dayData[meal.id]?.done;
                const isOpen = openMeal === meal.id;
                return (
                  <div
                    key={meal.id}
                    className={`meal-card${isDone?" done":""}${isOpen?" open":""}`}
                    onClick={() => setOpenMeal(isOpen ? null : meal.id)}
                  >
                    <div className="meal-icon-box">{meal.icon}</div>
                    <div className="meal-info">
                      <div className="meal-nm">{meal.name}</div>
                      <div className="meal-time-lbl">{meal.time}</div>
                      <div className="meal-items">
                        {meal.items.map((it,i)=><div key={i} style={{marginBottom:2}}>· {it}</div>)}
                      </div>
                    </div>
                    <div className="meal-right">
                      <div
                        className="check-ring"
                        onClick={e => { e.stopPropagation(); toggleMeal(meal.id); }}
                      >
                        {isDone ? "✓" : ""}
                      </div>
                      {isDone
                        ? <div className="done-time">{dayData[meal.id]?.time}</div>
                        : <div className="macro-tag">{meal.protein}g P · {meal.kcal} kcal</div>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ═══ WEEK TAB ═══ */}
        {tab === "week" && (
          <div className="week-grid" style={{paddingTop:16}}>
            <div className="sec-title">7-DAY MEAL LOG</div>
            {last7Keys().map(k => {
              const d = weekData[k] || {};
              const cnt = MEALS.filter(m=>d[m.id]?.done).length;
              const wpct = Math.round((cnt/MEALS.length)*100);
              const isToday = k === today;
              return (
                <div key={k} className="week-day">
                  <div className="week-day-header">
                    <span className={`week-day-name${isToday?" today-lbl":""}`}>
                      {dateLabel(k)}{isToday?" · Today":""}
                    </span>
                    <span className="week-day-pct" style={{color: wpct>=80?GREEN:wpct>=50?AMBER:"#5a7a5a"}}>
                      {wpct}%
                    </span>
                  </div>
                  <div className="week-meal-dots">
                    {MEALS.map(m => {
                      const done = !!d[m.id]?.done;
                      return (
                        <div key={m.id} className={`mdot${done?" done-dot":""}`} title={`${m.name}: ${d[m.id]?.time||"not done"}`}>
                          {m.icon}
                          {done && <span className="tick">✓</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ ALTS TAB ═══ */}
        {tab === "alts" && (
          <div className="alts-section" style={{paddingTop:16}}>
            <div className="sec-title">PRE-SLEEP ALTERNATIVES</div>
            <div className="alt-intro">
              🌙 Since milk isn't always available at night — here are storable, zero-hassle options you can buy once and keep in your room for weeks or months.
            </div>
            {SLEEP_ALTS.map((a,i) => (
              <div key={i} className="alt-card">
                <div className="alt-name">{a.name}</div>
                <div className="alt-desc">{a.desc}</div>
                <div className="alt-row">
                  <span className="alt-chip chip-g">~{a.protein} protein</span>
                  <span className="alt-chip chip-y">{a.price}</span>
                </div>
                <div className="alt-note">{a.note}</div>
              </div>
            ))}
          </div>
        )}

        {/* ═══ WEIGHT TAB ═══ */}
        {tab === "weight" && (
          <div className="weight-section" style={{paddingTop:16}}>
            <div className="sec-title">WEIGHT LOG</div>
            <div className="weight-input-box">
              <div className="w-label">Log Today's Weight</div>
              <div className="w-row">
                <input
                  className="w-input"
                  type="number"
                  step="0.1"
                  inputMode="decimal"
                  placeholder="e.g. 69.5"
                  value={weightInput}
                  onChange={e=>setWeightInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&logWeight()}
                />
                <button className="w-btn" onClick={logWeight}>SAVE KG</button>
              </div>
            </div>

            <div className="weight-log">
              {weights.length === 0 && <div className="empty-state">No weight entries yet.<br/>Log your first weight above ↑</div>}
              {weights.map((entry, i) => {
                const prev = weights[i+1];
                const diff = prev ? (entry.weight - prev.weight) : null;
                return (
                  <div key={entry.date} className="wlog-row">
                    <span className="wlog-date">{dateLabel(entry.date)}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {diff !== null && (
                        <span className={`wlog-diff ${diff>0?"diff-up":diff<0?"diff-dn":"diff-nc"}`}>
                          {diff>0?"+":""}{diff.toFixed(1)} kg
                        </span>
                      )}
                      <span className="wlog-val">{entry.weight} <span style={{fontSize:13,color:"#5a7a5a"}}>kg</span></span>
                    </div>
                  </div>
                );
              })}
            </div>

            {weights.length > 0 && (
              <div style={{marginTop:16,background:"#0d120e",border:"1px solid #182018",borderRadius:12,padding:14}}>
                <div style={{fontSize:11,color:"#3a5a3a",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Goal Progress</div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#5a7a5a"}}>Start: <b style={{color:"#dde8dd"}}>69 kg</b></span>
                  <span style={{color:"#5a7a5a"}}>Current: <b style={{color:GREEN}}>{weights[0]?.weight} kg</b></span>
                  <span style={{color:"#5a7a5a"}}>Goal: <b style={{color:"#dde8dd"}}>80 kg</b></span>
                </div>
                <div className="bar-track">
                  <div className="bar-fill" style={{width:`${Math.min(100,((weights[0]?.weight-69)/(80-69))*100)}%`}}/>
                </div>
                <div style={{fontSize:11,color:"#3a5a3a",marginTop:6}}>
                  {(80 - (weights[0]?.weight||69)).toFixed(1)} kg remaining to goal
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <nav className="nav-bar">
        {[
          { id:"today",  icon:"☑️", label:"Today"  },
          { id:"week",   icon:"📅", label:"Week"   },
          { id:"alts",   icon:"🌙", label:"Night"  },
          { id:"weight", icon:"⚖️", label:"Weight" },
        ].map(n => (
          <button key={n.id} className={`nav-btn${tab===n.id?" active":""}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            {n.label}
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Install Prompt + Service Worker -->
<script>
  /* ── INSTALL BANNER ── */
  let deferredPrompt = null;
  const banner   = document.getElementById("install-banner");
  const installBtn = document.getElementById("install-btn");
  const closeBtn = document.getElementById("banner-close");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    banner.style.display = "flex";
    // Push app content down
    document.querySelector("#root").style.paddingTop = "56px";
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.style.display = "none";
    document.querySelector("#root").style.paddingTop = "";
  });

  closeBtn.addEventListener("click", () => {
    banner.style.display = "none";
    document.querySelector("#root").style.paddingTop = "";
  });

  window.addEventListener("appinstalled", () => {
    banner.style.display = "none";
    document.querySelector("#root").style.paddingTop = "";
  });

  /* ── SERVICE WORKER (offline cache) ── */
  if ("serviceWorker" in navigator) {
    const swCode = `
      const CACHE = "bulk-tracker-v1";
      const ASSETS = ["/"];
      self.addEventListener("install", e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
        self.skipWaiting();
      });
      self.addEventListener("fetch", e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match("/")))
        );
      });
    `;
    const blob = new Blob([swCode], { type: "application/javascript" });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }
</script>
</body>
